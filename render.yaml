services:
  - type: web
    name: task-management-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User will input this securely on Render's dashboard
      - key: JWT_SECRET
        sync: false # User will input this securely on Render's dashboard
      - key: FRONTEND_URL
        sync: false # User will input this securely on Render's dashboard
      - key: GROQ_API_KEY
        sync: false # Optional: User will input this securely on Render's dashboard
